function startLiveClock() {
    setInterval(() => {
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        
        const clockEl = document.getElementById('liveClockDisplay');

            timeInput.value = `${hours}:${minutes}`;
            timeInput.setAttribute('data-autofill', 'true'); 
        }
    }, 1000);
}

// 1. Save Order mein Pickup Date logic

function saveOrder() {
    const t = document.getElementById('Ticket').value;
    const n = document.getElementById('name').value;
    
    if(!t || !n || !basket.length) {
        return showModal("Incomplete", "Ticket No, Name and Items are required!", "❌", null, false);
    }
    
    // --- NAYA LOGIC: Ticket Number Duplicate Check (Sirf Aaj ki Date ke liye) ---
    const pDate = document.getElementById('pickupDate').value || new Date().toISOString().split('T')[0];
    
    // Agar hum naya order save kar rahe hain (editingOrderId null hai)
    if (!editingOrderId) {
        let isExist = orders.some(o => o.Ticket == t && o.date === pDate);
        if (isExist) {
            return showModal("Duplicate Ticket", `Ticket No. ${t} Exist `, "⚠️", null);
        }
    }

    const currentUser = localStorage.getItem('app_user_name');
    const timestamp = new Date().toLocaleString();
    const pTime = document.getElementById('pickupTime').value;

    let sub = basket.reduce((a,b) => a + b.total, 0);
    
    let orderObj = { 
        Ticket: t, 
        name: n, 
        phone: document.getElementById('phone').value, 
        pickupDate: pDate, 
        pickup: pTime,
        items: [...basket], 
        total: sub * 1.05, 
        date: pDate, 
        id: editingOrderId || Date.now(), 
        isPicked: false,
        lastEditedBy: currentUser,
        lastEditedTime: timestamp,
        lastEditDate: new Date().toLocaleDateString()
    };

    if(editingOrderId) {
        let idx = orders.findIndex(o => o.id === editingOrderId);
        orderObj.isPicked = orders[idx].isPicked;
        orders[idx] = orderObj;
    } else {
        orders.unshift(orderObj);
    }

    localStorage.setItem('oman_v10_orders', JSON.stringify(orders));
    syncToFirebase();
    resetForm();
    
    document.getElementById('dateSearch').value = pDate;
    showView('history'); 
    renderHistory();
}


// 2. Countdown mein Days, Hours, Mins, Secs
function getCountdown(pickupTime, pickupDate) {
    if (!pickupTime) return "Not Set";
    
    // Agar date nahi di gayi toh order ki date use karein
    const target = new Date(pickupDate + 'T' + pickupTime);
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) return `<span style="color:var(--accent); font-weight:bold;">⚠️ Time Over!</span>`;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    return `⏳ ${d > 0 ? d + 'd ' : ''}${h}h ${m}m ${s}s left`;
}




// 1. Pehle ye helper function apne script mein kahin bhi daal dein
function formatTime(t) {
    if (!t) return "Not Set";
    let [h, m] = t.split(':');
    let suffix = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12; // 0 ko 12 mein badalta hai
    return `${h}:${m} ${suffix}`;
}

// 2. Ab ye aapka updated renderHistory function hai
// 1. Countdown calculate karne ke liye helper function
function getCountdown(pickupTime, orderDate) {
    if (!pickupTime) return "Not Set";
    
    const target = new Date(orderDate + 'T' + pickupTime);
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) return `<span style="color:var(--accent); font-weight:bold;">⚠️ Time Over!</span>`;

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    return `⏳ ${h}h ${m}m ${s}s left`;
}

// 2. Updated renderHistory function (Timer display ke saath)

let currentFilter = 'all'; // Default sab dikhega


function renderHistory() {
    // 1. Date filter check karein
    const dt = document.getElementById('dateSearch').value;
    
    // 2. Orders ko date ke hisab se filter karein
    let filtered = orders.filter(x => x.date === dt);

    // 3. Buttons (All, Unpicked, Picked) ke hisab se filter karein
    if (currentFilter === 'unpicked') {
        filtered = filtered.filter(x => !x.isPicked);
    } else if (currentFilter === 'picked') {
        filtered = filtered.filter(x => x.isPicked);
    }

    // 4. UI par Active Button ko highlight karein
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    
    if (currentFilter === 'all') document.getElementById('btnAll').classList.add('active');
    if (currentFilter === 'unpicked') document.getElementById('btnUnpicked').classList.add('active');
    if (currentFilter === 'picked') document.getElementById('btnPicked').classList.add('active');

    // 5. Data ko Screen par render karein
    const historyContainer = document.getElementById('historyData');
    
    if (filtered.length === 0) {
        historyContainer.innerHTML = `
            <div style="text-align:center; padding:50px; color:#64748b;">
                <p style="font-size:3rem; margin:0;">📁</p>
                <p>No Order Found</p>
            </div>`;
        return;
    }

    function addBasket() {
        let s = document.getElementById('itemSel'), 
            n = s.value, 
            qInput = document.getElementById('qty').value;
        
        let q = parseInt(qInput);
        if(!n || isNaN(q) || q <= 0) return;
        
        let p = parseFloat(s.options[s.selectedIndex].getAttribute('data-p'));
        
        // --- NAYA LOGIC: Check karo kya ye item basket mein pehle se hai? ---
        let existingItemIndex = basket.findIndex(item => item.name === n);
        
        if (existingItemIndex !== -1) {
            // Agar mil gaya, toh purani qty mein naya qty jod do
            basket[existingItemIndex].qty += q;
            // Naya total calculate karo
            basket[existingItemIndex].total = basket[existingItemIndex].qty * basket[existingItemIndex].price;
        } else {
            // Agar naya item hai, toh pehle ki tarah naya object bana kar add karo
            basket.push({name:n, price:p, qty:q, total:q*p});
        }
        
        renderBasket();
        document.getElementById('qty').value = ''; // Qty input khaali karo
    }

            </div>`).join('');
    }

function autoTicket() {
    // 1. Pickup Date waale input se date uthayein (Agar khali hai toh aaj ki date lein)
    let selectedDate = document.getElementById('pickupDate').value;
    if (!selectedDate) {
        selectedDate = new Date().toISOString().split('T')[0];
    }
    
    // 2. Sirf us SELECTED DATE ke orders ko filter karein
    let dateOrders = orders.filter(o => o.date === selectedDate);
    
    let nextTicket = 1;

    if (dateOrders.length > 0) {
        // Us specific date ka sabse bada ticket number dhundhein
        let max = 0;
        dateOrders.forEach(o => {
            let tNum = parseInt(o.Ticket);
            if (tNum > max) max = tNum;
        });
        nextTicket = max + 1;
    }

    // 3. Safety Check: Ensure karein ki ye number us date ke liye unique ho
    while (orders.some(o => o.Ticket == nextTicket && o.date === selectedDate)) {
        nextTicket++;
    }

    // Input field mein ticket number set karein
    document.getElementById('Ticket').value = nextTicket;
}

// 1. Time ko AM/PM mein badalne ke liye
function formatAMPM(time) {
    if (!time) return "Not Set";
    let [hours, minutes] = time.split(':');
    let ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return hours + ':' + minutes + ' ' + ampm;
}

// 2. Countdown calculate karne ke liye (Days, Hours, Minutes, Seconds)
function getCountdown(pickupTime, pickupDate) {
    if (!pickupTime) return "Timer Not Set";
    
    const target = new Date((pickupDate || new Date().toISOString().split('T')[0]) + 'T' + pickupTime);
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) return `<span style="color:var(--accent); font-weight:bold;">⚠️ Time Over!</span>`;

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    let countdownStr = "⏳ ";
    if (d > 0) countdownStr += d + "d "; // Sirf tab dikhao jab 1 din se upar ho
    countdownStr += `${h}h ${m}m ${s}s left`;
    
    return countdownStr;
}
